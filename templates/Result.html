<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Results 📊</h2>

        <div class="table-container">
            {% if tables and tables|length > 0 %}
                {{ tables[0]|safe }}
            {% else %}
                <p>No results found.</p>
            {% endif %}
        </div>

        <br>
        <a href="/">⬅ Go Back</a>
    </div>
</body>
</html>
